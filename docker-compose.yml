services:
  backend:
    build:
      context: ./backend
    container_name: openstack-lab-control-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: openstack-lab-control-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: unless-stopped
